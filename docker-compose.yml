# API-only mode: ComfyUI and ai-toolkit are host-native and out of scope for this container.
services:
  studio:
    build: .
    ports: ["5050:5050"]
    volumes:
      - ./data-docker:/data
      - ./.env:/app/.env
    environment:
      - LDS_CONFIG=/data/config.json
      - LDS_HOST=0.0.0.0
      - LDS_PORT=5050
