# Release automation: push a tag `vYYYY.MM.DD[.N]` and this publishes a Windows
# source ZIP launched through start.bat. Binary launchers are intentionally not
# release assets. The in-app update check compares the latest release tag against
# backend/app/version.py, so the tag MUST match APP_VERSION — enforced below.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the release + upload the asset

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag must match APP_VERSION
        shell: pwsh
        run: |
          $v = (Select-String -Path backend/app/version.py -Pattern "APP_VERSION = '([^']+)'").Matches[0].Groups[1].Value
          if ("v$v" -ne "${{ github.ref_name }}") {
            throw "tag ${{ github.ref_name }} does not match APP_VERSION $v - bump backend/app/version.py first"
          }

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run all frontend tests
        working-directory: frontend
        run: npm test

      - name: Rebuild frontend
        working-directory: frontend
        run: npm run build

      - name: Verify the tracked frontend build is current
        shell: pwsh
        run: |
          $changes = @(git status --porcelain --untracked-files=all -- frontend/dist)
          if ($changes.Count -gt 0) {
            $changes | ForEach-Object { Write-Host $_ }
            git diff -- frontend/dist
            throw "frontend/dist is stale - rebuild it and commit the result before tagging a release"
          }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enforce release asset policy
        run: python scripts/check_release_artifacts.py

      - name: Test release asset guard
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Run the test suite
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.txt
          python -m pytest backend/tests -q

      - name: Build the Windows source ZIP
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}   # stamps build_info.json in the bundle
        run: ./packaging/build_release_zip.ps1

      - name: Verify release archive policy
        run: python scripts/check_release_artifacts.py packaging/dist/LoRA-Dataset-Studio-windows.zip

      - name: Publish the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "packaging/dist/LoRA-Dataset-Studio-windows.zip" `
            --title "LoRA Dataset Studio ${{ github.ref_name }}" `
            --generate-notes
