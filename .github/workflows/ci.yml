name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests -q

  frontend-quality:
    name: Frontend tests and tracked build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run all frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify the tracked frontend build is current
        shell: bash
        run: |
          changes="$(git status --porcelain --untracked-files=all -- dist)"
          if [[ -n "$changes" ]]; then
            echo "::error::frontend/dist is stale. Run 'npm run build' in frontend/ and commit the result."
            printf '%s\n' "$changes"
            git diff -- dist
            exit 1

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag lds-ci:${{ github.sha }} .

      - name: Start container
        run: docker run --detach --name lds-ci --publish 5050:5050 lds-ci:${{ github.sha }}

      - name: Wait for API health
        shell: bash
        run: |
          deadline=$((SECONDS + 120))
          until curl --fail --silent --show-error http://127.0.0.1:5050/api/health >/dev/null; do
            if (( SECONDS >= deadline )); then
              echo "::error::Docker API did not become healthy within 120 seconds"
              exit 1
            fi
            sleep 2
          done

      - name: Show container logs on failure
        if: failure()
        shell: bash
        run: |
          if docker container inspect lds-ci >/dev/null 2>&1; then
            docker logs lds-ci
          fi

      - name: Remove smoke-test container
        if: always()
        shell: bash
        run: |
          if docker container inspect lds-ci >/dev/null 2>&1; then
            docker rm --force lds-ci
          fi
